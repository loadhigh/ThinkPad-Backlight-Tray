name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'   # SDK only — app targets .NET Framework 4.8.1

      - name: Publish
        run: dotnet publish ThinkPad-Backlight-Tray.csproj -c Release -o publish

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          ver="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "ver=$ver" >> "$GITHUB_OUTPUT"

      - name: Zip portable release
        shell: pwsh
        run: Compress-Archive -Path publish\* -DestinationPath "ThinkPad-Backlight-Tray-${{ steps.version.outputs.tag }}.zip"

      - name: Build installer
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion="${{ steps.version.outputs.ver }}" `
            /DPublishDir="$PWD\publish" `
            installer\setup.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            ThinkPad-Backlight-Tray-${{ steps.version.outputs.tag }}.zip
            installer/Output/ThinkPad-Backlight-Tray-Setup-${{ steps.version.outputs.tag }}.exe