name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'   # SDK only — app targets .NET Framework 4.8.1

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag.StartsWith("v")) {
            $ver = $tag.Substring(1)
          } else {
            $ver = $tag
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "ver=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build
        run: dotnet build ThinkPad-Backlight-Tray.csproj -c Release

      - name: Publish
        run: dotnet publish ThinkPad-Backlight-Tray.csproj -c Release -o publish

      - name: Zip portable release
        id: zip
        shell: pwsh
        run: |
          $zipName = "ThinkPad-Backlight-Tray-v${{ steps.version.outputs.ver }}-portable.zip"
          Compress-Archive -Path publish\* -DestinationPath $zipName -Force
          "path=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install WiX tool
        shell: pwsh
        run: dotnet tool install --global wix

      - name: Build MSI installer
        run: |
          $publishDir = (Resolve-Path .\publish).Path
          dotnet build installer\ThinkPad-Backlight-Tray.Installer.wixproj -c Release -p:Version=${{ steps.version.outputs.ver }} -p:PublishDir="$publishDir"

      - name: Resolve MSI path
        id: msi
        shell: pwsh
        run: |
          $msiName = "ThinkPad-Backlight-Tray-Setup-v${{ steps.version.outputs.ver }}.msi"
          $msiPath = Join-Path "installer\bin\Release" $msiName
          if (!(Test-Path $msiPath)) {
            throw "MSI not found: $msiPath"
          }
          "path=$msiPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.zip.outputs.path }}
            ${{ steps.msi.outputs.path }}